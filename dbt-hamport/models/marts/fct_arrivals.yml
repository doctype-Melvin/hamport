version: 2

models:
  - name: fct_arrivals
    description: "Gold layer. Final fact table for airport arrivals used in dashboard."
    columns:
      - name: arrival_key
        description: "Primary key. MD5 hash of flight id and planned time of arrival."
        tests:
          - unique
          - not_null
      - name: delay_minutes
        description: "Delay in minutes. NULL if cancelled, 0 if on time."
      - name: punctual
        description: "Evaluates punctuality of arrivals"
        tests:
          - not_null